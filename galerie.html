  <style>
    :root {
      --bg:    #050d1a;
      --bg2:   #081526;
      --bg3:   #0d1e35;
      --cyan:  #06b6d4;
      --lime:  #a3e635;
      --g2:    #e2e8f0;
      --g4:    #94a3b8;
      --r:     8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--g2);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,13,26,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: .875rem 1.5rem;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .back-link {
      display: flex; align-items: center; gap: .5rem;
      color: var(--cyan); text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .9rem; letter-spacing: .08em;
      text-transform: uppercase;
      transition: opacity .2s;
    }
    .back-link:hover { opacity: .75; }
    .back-link svg { flex-shrink: 0; }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 1.1rem;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--g2);
    }
    .topbar-count {
      margin-left: auto;
      font-size: .8rem; color: var(--g4);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }

    /* HERO */
    .page-hero {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      background: linear-gradient(to bottom, var(--bg2), var(--bg));
    }
    .page-hero .pretitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .75rem;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: .75rem;
    }
    .page-hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-style: italic; font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: .95; text-transform: uppercase;
      color: #fff;
      margin-bottom: 1rem;
    }
    .page-hero h1 span { color: var(--lime); }
    .page-hero p {
      color: var(--g4); font-size: .9rem; max-width: 36ch; margin: 0 auto;
    }

    /* GRID */
    .gallery-wrap {
      max-width: 1400px; margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .fg-grid {
      columns: 4 240px;
      column-gap: .5rem;
    }
    .fg-item {
      display: block; break-inside: avoid;
      margin-bottom: .5rem;
      border-radius: var(--r); overflow: hidden;
      cursor: zoom-in; position: relative;
    }
    .fg-item img {
      width: 100%; height: auto; display: block;
      transition: transform .4s ease, filter .4s ease;
    }
    .fg-item:hover img { transform: scale(1.04); filter: brightness(1.1); }
    .fg-item::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(6,182,212,.12), transparent 60%);
      opacity: 0; transition: opacity .3s;
      pointer-events: none; border-radius: var(--r);
    }
    .fg-item:hover::after { opacity: 1; }

    /* LIGHTBOX */
    .lb {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(5,13,26,.97); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .lb.open { display: flex; }
    .lb-inner {
      position: relative; max-width: 92vw; max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-inner img {
      max-width: 92vw; max-height: 90vh;
      object-fit: contain; border-radius: var(--r);
      box-shadow: 0 0 80px rgba(6,182,212,.15);
      display: block;
    }
    .lb-close {
      position: fixed; top: 1rem; right: 1.25rem;
      background: none; border: 2px solid rgba(255,255,255,.2);
      color: #fff; width: 2.75rem; height: 2.75rem;
      border-radius: 50%; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s; z-index: 1001;
    }
    .lb-close:hover { border-color: var(--cyan); background: rgba(6,182,212,.12); }
    .lb-counter {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: .85rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--g4); z-index: 1001;
    }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 2px solid rgba(255,255,255,.18);
      color: #fff; width: 3rem; height: 3rem; border-radius: 50%;
      font-size: 1.5rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s; z-index: 1001;
    }
    .lb-nav:hover { border-color: var(--cyan); background: rgba(6,182,212,.12); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    @media(max-width: 600px) {
      .lb-nav { display: none; }
      .fg-grid { columns: 2 140px; }
    }

    /* FOOTER */
    .page-footer {
      text-align: center; padding: 2rem 1rem;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: .8rem; color: var(--g4);
    }
    .page-footer a { color: var(--cyan); text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }
  </style>
</head>

  <!-- LIGHTBOX -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Bild-Vollansicht">
    <div class="lb-inner">
      <img src="" alt="" id="lbImg">
    </div>
    <button class="lb-close" id="lbClose" aria-label="Schließen">&#x2715;</button>
    <div class="lb-counter" id="lbCounter" aria-live="polite"></div>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Vorheriges Bild">&#x2039;</button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Nächstes Bild">&#x203A;</button>
  </div>

<script>
(function(){
  var lb      = document.getElementById('lb');
  var lbImg   = document.getElementById('lbImg');
  var lbCount = document.getElementById('lbCounter');
  var items   = Array.from(document.querySelectorAll('.fg-item'));
  var current = 0;

  function openAt(idx) {
    current = (idx + items.length) % items.length;
    var img = items[current].querySelector('img');
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    lbCount.textContent = (current + 1) + ' / ' + items.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('lbClose').focus();
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
    items[current].focus();
  }

  items.forEach(function(item, idx) {
    item.addEventListener('click', function(e) { e.preventDefault(); openAt(idx); });
  });

  document.getElementById('lbClose').addEventListener('click', close);
  document.getElementById('lbPrev').addEventListener('click', function() { openAt(current - 1); });
  document.getElementById('lbNext').addEventListener('click', function() { openAt(current + 1); });

  lb.addEventListener('click', function(e) { if (e.target === lb) close(); });

  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  { e.preventDefault(); openAt(current - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); openAt(current + 1); }
  });

  // touch swipe
  var touchX = 0;
  lb.addEventListener('touchstart', function(e) { touchX = e.changedTouches[0].clientX; }, {passive: true});
  lb.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) dx < 0 ? openAt(current + 1) : openAt(current - 1);
  });
})();
</script>
